memories:
  flash:
    {base_addr: 0x00000000, file: firmware/test_irq.bin,
     permissions: r-x, size: 0x10000}
  ram:
    {base_addr: 0x40000000, size: 0x10000, permissions: rw-}
  # Required by avatar2 / configurable_machine for the halucinator
  # heap; not used directly by this firmware.
  halucinator:
    {base_addr: 0x60000000, size: 0x100000, permissions: rw-}
  # GICv2: real arm_gic device on avatar2/qemu (configurable
  # machine reads qemu_name + regions + irq + properties to
  # instantiate, MMIO-map both regions, and wire the parent_irq
  # output to the CPU's IRQ input). For backends that don't honor
  # qemu_name (unicorn, ghidra), this is just a plain RW memory
  # range covering both GIC regions; the IrqController's
  # shadow-write path delivers there.
  gic:
    base_addr: 0x08000000
    size: 0x11000
    qemu_name: arm_gic
    permissions: rw-
    regions:
      - {region: 1, address: 0x08010000}
    irq:
      - {dev: cpu, irq_num: 0}
    properties:
      - {name: num-cpu, type: uint32, value: 1}
      - {name: num-irq, type: uint32, value: 64}
      - {name: revision, type: uint32, value: 2}
peripherals:
  logger:
    {base_addr: 0x50000000, emulate: GenericPeripheral,
     permissions: rw-, size: 0x10000000}
