
machine:
  arch: cortex-m3
  cpu_model: cortex-m3
  entry_addr: 0x08004ef9

memories:
  alias:
    {
      base_addr: 0x0,
      file: Drone.bin,
      permissions: r-x,
      size: 0x800000
    }
  flash:
    {
      base_addr: 0x8000000,
      file: Drone.bin,
      permissions: r-x,
      size: 0x200000
    }
  ram: { base_addr: 0x20000000, size: 0x51000 }
  halucinator-irq: {base_addr: 0x3ffc000, size: 0x4000}
  halucinator: {base_addr: 0x04000000, size: 0x0100000} 
peripherals:
  logger:
    {
      base_addr: 0x40000000,
      emulate: GenericPeripheral,
      permissions: rw-,
      size: 0x20000000
    }

