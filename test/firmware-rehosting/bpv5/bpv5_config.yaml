  # --- Onboard SPI-NAND storage — MODELED at the FatFs ABI seam ---
  # Replaces the boot-time skip_storage_mount (which faked mount success
  # without ever exercising FatFs). storage_mount now RUNS for real and calls
  # our intercepted f_mount -> FR_OK, so the firmware records the volume mounted
  # and computes a capacity from the seeded BPB fields. storage_init stays
  # SkipFunc'd (it's the SSP-NAND GPIO/pin bring-up; the FatFs HLE doesn't need
  # the real NAND/dhara layer beneath it). The trio f_opendir/f_readdir/
  # f_closedir serves the CLI `ls` (disk_ls_handler -> storage_ls) a modeled
  # directory; f_open/f_gets/f_read/f_close serve the CLI `cat` and
  # storage_load_config a modeled file. See bp_handlers/bpv5/nand.py.
  - class: halucinator.bp_handlers.bpv5.nand.NandStorage
