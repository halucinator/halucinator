  # BINLOOP (#13) — binmode: kept SkipFunc'd (intractable for a console-visible
  # proof — see below). RE finding (bp_handlers/bpv5/scope.py + an empirical test):
  #  * binmode's service loop runs ENTIRELY on core1 (core1_entry @0x10000330),
  #    which is never launched headless (multicore_launch_core1 is SkipFunc'd).
  #  * binmode I/O is on USB CDC interface 1 (tud_cdc_n_*(1,...)) — a SEPARATE
  #    USB serial channel from the terminal's interface 0 — so the binmode/SUMP
  #    identity ("RP2040 NNMhz", emitted by sump_rx/cdc_sump_task) is never
  #    reachable on the console the test terminal is wired to.
  #  * Un-skipping binmode_service makes the REAL service run logicanalyzer_setup
  #    at boot, which CLAIMS the single-owner "big buffer" — then Scope's
  #    scope_setup fails ("the big buffer is already allocated", scope mode
  #    broken). So leaving it skipped is REQUIRED for Scope to work.
  # Net: binmode stalls at core1_entry (0x10000330, never launched) / its I/O on
  # CDC interface 1; landing it would need a core1 model + an interface-1 capture.
  - class: halucinator.bp_handlers.SkipFunc
    function: skip_binmode_service
    symbol: binmode_service
    registration_args:
      silent: true
