  # --- Modeled analog subsystem: ADC + AMUX + PSU (replaces skip_amux) -----
  # Every voltage the firmware prints flows through amux_sweep(), which fills a
  # global millivolt results struct (@0x20039510) that the `v` (measure pins),
  # `W` (PSU enable readback), psu_measure, and ui_help_sanity_check all read.
  # The stock config SkipFunc'd amux_sweep (it busy-polls unmodeled ADC MMIO),
  # leaving the struct all-zero -> "No voltage detected on VOUT/VREF". We HLE
  # amux_sweep instead, publishing MODELED rails (VOUT/VREF=3.3 V, an IO ramp)
  # straight into the struct, so the firmware's own rendering reports real
  # voltages and the sanity check (VOUT > 789 mV) passes naturally.
  - class: halucinator.bp_handlers.bpv5.adcpsu.AdcPsuModel
    function: sweep
    symbol: amux_sweep
    class_args:
      vout_mv: 3300
      vref_mv: 3300
      # Distinct per-pin ramp so a captured `v` reading is obviously modeled.
      pin_mv: [400, 800, 1200, 1600, 2000, 2400, 2800, 3200]
  # PSU set-point capture: the CLI `W <volts>` runs psucmd_enable -> psu_enable
  # (r0 = the float target voltage). We capture it so VOUT reads back the set
  # voltage, and we let the supply report enabled.
  - class: halucinator.bp_handlers.bpv5.adcpsu.AdcPsuModel
    function: psu_enable
    symbol: psu_enable
  - class: halucinator.bp_handlers.bpv5.adcpsu.AdcPsuModel
    function: psu_disable
    symbol: psu_disable
  # The `W` summary (and any value_voltage()-based readout) reads per-channel
  # ASCII voltage strings from a cache (@0x2003dc18) normally refreshed by the
  # periodic monitor() — which doesn't run on these paths under emulation (its
  # timer/core1 driver isn't live), so the cache would stay stale "0.0". Refresh
  # it just-in-time on monitor_get_voltage_ptr (observe-only: publish our modeled
  # mV struct + ASCII cache, then let the real getter return the ptr/validity
  # over fresh data). (The bare-`v` pin table renders via ui_info_print_pin_voltage
  # reading the mV struct directly, so it works from the sweep HLE + divider model
  # alone; this getter hook covers the cache-based readers.)
  - class: halucinator.bp_handlers.bpv5.adcpsu.AdcPsuModel
    function: get_voltage_ptr
    symbol: monitor_get_voltage_ptr
  # --- RP2040 SIO hardware-divider model ----------------------------------
  # The `v` table (and other firmware integer divides) compute mV->volts via
  # the SIO hardware divider (0xd0000000+0x60). That MMIO window is plain RAM
  # under emulation, so the divider never computes -> every divide returns 0
  # (the modeled voltages rendered as "0.0V" despite a correct mV struct). HLE
  # the unsigned + signed divmod helpers so division actually works.
  - class: halucinator.bp_handlers.bpv5.adcpsu.AdcPsuModel
    function: divmod_u32
    symbol: divmod_u32u32
  - class: halucinator.bp_handlers.bpv5.adcpsu.AdcPsuModel
    function: divmod_s32
    symbol: divmod_s32s32_unsafe
