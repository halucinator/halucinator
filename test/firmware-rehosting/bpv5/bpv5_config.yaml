  # --- Scope (#14): the oscilloscope DISPLAY mode -------------------------
  # "Scope" is display-mode index 1 (NOT a `m`-menu bus mode); the CLI enters
  # it with `d 2` (ui_display_enable_args validates N<=3, uses N-1 to index the
  # display-mode table @0x20001990 stride 0x40: 0=Default,1=Scope,2=Disabled).
  # On `d 2` the firmware runs scope_cleanup, scope_setup (allocs the sample
  # buffers via the real mem_alloc -> returns 1), scope_setup_exc (records the
  # buffer ptrs + enables the panel), then printf("Display mode: Scope").
  # The free-running acquisition/render pipeline (scope_periodic -> ADC+DMA ->
  # DMA-done IRQ -> scope_lcd_update framebuffer plot) does NOT fire headless
  # (no live core1/DMA/sample IRQ). We let scope_setup_exc RUN for real and only
  # neuter lcd_enable (raw SPI/SIO ST7789 power-on that faults headless) so the
  # mode is entered cleanly and the firmware prints its identity line. The
  # modeled DC waveform (raw 0x800 -> ~3.3 V) is logged for the readout proof.
  # NOTE: HALucinator caches one shared instance per handler CLASS (the first
  # intercept's class_args win), so the modeled level/waveform is set ONCE here.
  - class: halucinator.bp_handlers.bpv5.scope.ScopeModel
    function: setup_exc
    symbol: scope_setup_exc
    class_args:
      level_raw: 0x800   # mid-scale ADC count -> ~3.3 V (mV = raw*6600>>12)
      waveform: dc
  - class: halucinator.bp_handlers.bpv5.scope.ScopeModel
    function: lcd_enable
    symbol: lcd_enable
  # scope_periodic runs every core0 loop while Scope is the active display mode;
  # we inject the modeled waveform into the firmware's recorded sample buffer.
  - class: halucinator.bp_handlers.bpv5.scope.ScopeModel
    function: periodic
    symbol: scope_periodic
