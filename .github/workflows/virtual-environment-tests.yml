name: Virtual Environment Regression Tests

on:
  push:
  pull_request:
    branches:
       - master

jobs:

  test-env:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        include:
          - os: ubuntu-22.04
            codename: jammy
          - os: ubuntu-24.04
            codename: noble
    env:
      HALUCINATOR_QEMU_ARM: "${{ github.workspace }}/deps/build-qemu/arm-softmmu/qemu-system-arm"
      HALUCINATOR_QEMU_ARM64: "${{ github.workspace }}/deps/build-qemu/aarch64-softmmu/qemu-system-aarch64"
      HALUCINATOR_QEMU_MIPS: "${{ github.workspace }}/deps/build-qemu/mips-softmmu/qemu-system-mips"
      HALUCINATOR_QEMU_PPC: "${{ github.workspace }}/deps/build-qemu/ppc-softmmu/qemu-system-ppc"
      HALUCINATOR_QEMU_PPC64: "${{ github.workspace }}/deps/build-qemu/ppc64-softmmu/qemu-system-ppc64"
      HALUCINATOR_QEMU_X86: "${{ github.workspace }}/deps/build-qemu/i386-softmmu/qemu-system-i386"
      # avatar2's QemuTarget constructor falls back to AVATAR2_QEMU_EXECUTABLE
      # when the caller passes executable=None. Point it at the built ARM QEMU
      # so test_arm_qemu.py's avatar2-spawning tests find a binary even if
      # HALUCINATOR_QEMU_ARM is unset in a given shell.
      AVATAR2_QEMU_EXECUTABLE: "${{ github.workspace }}/deps/build-qemu/arm-softmmu/qemu-system-arm"
      # libafl-qemu-bridge build output — same per-arch layout under
      # deps/build-qemu-libafl/. Only ARM is built in CI by default
      # (sufficient to exercise LibAflQemuBackend's live e2e); other
      # archs can be added once the test surface needs them.
      HALUCINATOR_QEMU_LIBAFL_ARM: "${{ github.workspace }}/deps/build-qemu-libafl/arm-softmmu/qemu-system-arm"
      # Upstream-QEMU + avatar overlay output. build_qemu.sh
      # --upstream-qemu <ref> clones vanilla upstream QEMU at the given
      # tag into deps/qemu-upstream-<ref>/, applies the
      # tools/avatar-qemu-overlay patches, and builds into
      # deps/build-qemu-upstream-<ref>/. The same overlay tree is
      # exercised against three points along the QEMU release timeline
      # so a patch break shows up on the *first* version it stops
      # tracking, not at integration time. ARM-only — same scope as the
      # libafl build; other archs are a matter of extending the target
      # list.
      HALUCINATOR_QEMU_UPSTREAM_V62_ARM:  "${{ github.workspace }}/deps/build-qemu-upstream-v6.2.0/arm-softmmu/qemu-system-arm"
      HALUCINATOR_QEMU_UPSTREAM_V10_ARM:  "${{ github.workspace }}/deps/build-qemu-upstream-v10.0.9/arm-softmmu/qemu-system-arm"
      HALUCINATOR_QEMU_UPSTREAM_V11_ARM:  "${{ github.workspace }}/deps/build-qemu-upstream-v11.0.0/arm-softmmu/qemu-system-arm"

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true

    # The job builds FIVE full QEMU variants (avatar-qemu + libafl-qemu-bridge +
    # three upstream versions). On a fresh cache that exhausts the ~14 GB free on
    # the runner image ("No space left on device" during the libafl build), and
    # because the cache only saves on full-job success, the failure is sticky
    # (fail -> no cache -> rebuild -> fail). Reclaim the ~20-30 GB of preinstalled
    # toolchains/SDKs we don't use so the builds fit.
    - name: Free up runner disk space
      run: |
        set -x
        df -h /
        # Large preinstalled SDKs this job never uses (it builds its own venv
        # from apt's python3). Removing these reclaims ~20 GB; ignore-missing so
        # it stays robust across runner-image changes.
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                    /usr/local/.ghcup /opt/hostedtoolcache/CodeQL 2>/dev/null || true
        sudo docker image prune --all --force 2>/dev/null || true
        sudo apt-get clean || true
        df -h /

    - name: Install system dependencies
      run: |
        set -e
        set -x
        # Enable deb-src for build-dep (both main and security)
        echo "deb-src http://archive.ubuntu.com/ubuntu/ ${{ matrix.codename }} main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
        echo "deb-src http://archive.ubuntu.com/ubuntu/ ${{ matrix.codename }}-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
        sudo apt-get update
        sudo apt-get build-dep -y qemu || true
        sudo apt-get install -y \
                        clang-format \
                        build-essential \
                        ca-certificates \
                        cmake \
                        ethtool \
                        binutils-arm-none-eabi \
                        g++ \
                        gcc-arm-none-eabi \
                        libnewlib-arm-none-eabi \
                        libstdc++-arm-none-eabi-newlib \
                        git \
                        gdb-multiarch \
                        libaio-dev \
                        libglib2.0-dev \
                        libpixman-1-dev \
                        pkg-config \
                        python3-pip \
                        python3-venv \
                        python3-tk \
                        tcpdump \
                        vim \
                        wget \
                        ninja-build \
                        python3

    - name: Get avatar-qemu submodule commit
      id: qemu-ref
      run: echo "sha=$(git rev-parse HEAD:deps/avatar-qemu)" >> "$GITHUB_OUTPUT"

    - name: Get libafl-qemu-bridge submodule commit
      id: libafl-qemu-ref
      run: echo "sha=$(git rev-parse HEAD:deps/libafl-qemu-bridge)" >> "$GITHUB_OUTPUT"

    - name: Restore QEMU build cache
      id: cache-qemu
      uses: actions/cache/restore@v5
      with:
        path: deps/build-qemu
        # Bumping the v-prefix invalidates corrupt caches — the previous
        # v2 entries on this fork ended up with partial/empty build dirs
        # because the old `Save` step had `if: always()` and saved on
        # build failure too.
        key: qemu-build-v3-${{ matrix.os }}-${{ steps.qemu-ref.outputs.sha }}

    - name: Restore libafl-qemu-bridge build cache
      id: cache-libafl-qemu
      uses: actions/cache/restore@v5
      with:
        path: deps/build-qemu-libafl
        key: libafl-qemu-build-v1-${{ matrix.os }}-${{ steps.libafl-qemu-ref.outputs.sha }}

    - name: Setup Python virtualenv and install dependencies
      run: |
        set -e
        set -x
        python3 -m venv $(pwd)/virtualenvs/halucinator
        source $(pwd)/virtualenvs/halucinator/bin/activate
        pip install --upgrade pip
        pip install -e deps/avatar2/
        pip install -r src/requirements.txt
        pip install -e .
        # MCP server extra (mcp[cli] + capstone). The CI runners are Python
        # 3.10 (jammy) / 3.12 (noble), both >= the SDK's 3.10 floor, so the
        # MCP tests under test/pytest/mcp_server/ run on both.
        pip install -e '.[mcp]'
        pip install pytest-cov pytest-timeout

    - name: Build QEMU (cached)
      if: steps.cache-qemu.outputs.cache-hit != 'true'
      run: |
        set -e
        set -x
        rm -rf deps/build-qemu
        source $(pwd)/virtualenvs/halucinator/bin/activate
        ./build_qemu.sh

    - name: Get avatar-qemu-overlay content hash
      id: overlay-ref
      # Pure content hash of the overlay tree — bumps whenever any
      # patch, avatar source, or apply script changes. Used as part of
      # the per-ref cache keys below so a refresh of the overlay
      # invalidates *every* overlay-built cache, not just the first one
      # that hits.
      run: |
        h=$(git ls-files -s tools/avatar-qemu-overlay/ | git hash-object --stdin)
        echo "sha=$h" >> "$GITHUB_OUTPUT"

    # --- v6.2.0: the QEMU base our `avatar-qemu` fork tracks --------------
    - name: Restore upstream-QEMU v6.2.0 + overlay cache
      id: cache-upstream-qemu-v62
      uses: actions/cache/restore@v5
      with:
        path: deps/build-qemu-upstream-v6.2.0
        key: upstream-qemu-overlay-v6.2.0-${{ matrix.os }}-${{ steps.overlay-ref.outputs.sha }}

    - name: Build upstream-QEMU v6.2.0 + overlay ARM (cached)
      if: steps.cache-upstream-qemu-v62.outputs.cache-hit != 'true'
      run: |
        set -e
        set -x
        rm -rf deps/build-qemu-upstream-v6.2.0 deps/qemu-upstream-v6.2.0
        source $(pwd)/virtualenvs/halucinator/bin/activate
        ./build_qemu.sh --upstream-qemu v6.2.0 arm-softmmu
        # Drop the working clone — only the build output needs caching.
        rm -rf deps/qemu-upstream-v6.2.0

    # --- v10.0.9: latest 10.x point release --------------------------------
    - name: Restore upstream-QEMU v10.0.9 + overlay cache
      id: cache-upstream-qemu-v10
      uses: actions/cache/restore@v5
      with:
        path: deps/build-qemu-upstream-v10.0.9
        key: upstream-qemu-overlay-v10.0.9-${{ matrix.os }}-${{ steps.overlay-ref.outputs.sha }}

    - name: Build upstream-QEMU v10.0.9 + overlay ARM (cached)
      if: steps.cache-upstream-qemu-v10.outputs.cache-hit != 'true'
      run: |
        set -e
        set -x
        rm -rf deps/build-qemu-upstream-v10.0.9 deps/qemu-upstream-v10.0.9
        source $(pwd)/virtualenvs/halucinator/bin/activate
        # QEMU 10+ uses mkvenv (introduced in 8.x) and pulls in distlib
        # at configure time. The base ubuntu image doesn't ship it.
        pip install distlib
        ./build_qemu.sh --upstream-qemu v10.0.9 arm-softmmu
        rm -rf deps/qemu-upstream-v10.0.9

    # --- v11.0.0: current major (overlay applies via patch -N -F3 fallback)
    - name: Restore upstream-QEMU v11.0.0 + overlay cache
      id: cache-upstream-qemu-v11
      uses: actions/cache/restore@v5
      with:
        path: deps/build-qemu-upstream-v11.0.0
        key: upstream-qemu-overlay-v11.0.0-${{ matrix.os }}-${{ steps.overlay-ref.outputs.sha }}

    - name: Build upstream-QEMU v11.0.0 + overlay ARM (cached)
      if: steps.cache-upstream-qemu-v11.outputs.cache-hit != 'true'
      run: |
        set -e
        set -x
        rm -rf deps/build-qemu-upstream-v11.0.0 deps/qemu-upstream-v11.0.0
        source $(pwd)/virtualenvs/halucinator/bin/activate
        pip install distlib
        ./build_qemu.sh --upstream-qemu v11.0.0 arm-softmmu
        rm -rf deps/qemu-upstream-v11.0.0

    - name: Build libafl-qemu-bridge ARM (cached)
      # Only ARM is built — that's enough to exercise LibAflQemuBackend's
      # live e2e tests. Extending to the other archs is a matter of
      # appending to the target list; the bridge is a much larger build
      # so we keep CI scope tight until a test needs it.
      if: steps.cache-libafl-qemu.outputs.cache-hit != 'true'
      run: |
        set -e
        set -x
        rm -rf deps/build-qemu-libafl
        source $(pwd)/virtualenvs/halucinator/bin/activate
        # libafl-qemu-bridge tracks newer upstream QEMU, which uses
        # mkvenv (introduced in QEMU 8.x) and pulls in distlib at
        # configure-time. The base ubuntu image doesn't ship distlib,
        # so install it before configure runs.
        pip install distlib
        ./build_qemu.sh --source libafl-qemu-bridge arm-softmmu

    - name: Smoke-test QEMU binaries
      run: |
        set -e
        set -x
        for bin in arm-softmmu/qemu-system-arm aarch64-softmmu/qemu-system-aarch64 \
                   mips-softmmu/qemu-system-mips ppc-softmmu/qemu-system-ppc \
                   ppc64-softmmu/qemu-system-ppc64; do
          echo "=== Testing deps/build-qemu/$bin ==="
          deps/build-qemu/$bin --version
          ldd deps/build-qemu/$bin | grep "not found" && exit 1 || true
          # Verify the configurable machine type exists
          deps/build-qemu/$bin -machine help | grep -q configurable || {
            echo "FATAL: 'configurable' machine type missing from $bin"
            deps/build-qemu/$bin -machine help
            exit 1
          }
        done
        # libafl-qemu-bridge ARM build: same smoke checks
        if [ -x deps/build-qemu-libafl/arm-softmmu/qemu-system-arm ]; then
          echo "=== Testing deps/build-qemu-libafl/arm-softmmu/qemu-system-arm ==="
          deps/build-qemu-libafl/arm-softmmu/qemu-system-arm --version
          ldd deps/build-qemu-libafl/arm-softmmu/qemu-system-arm | grep "not found" && exit 1 || true
          deps/build-qemu-libafl/arm-softmmu/qemu-system-arm -machine help \
            | grep -q configurable || {
            echo "FATAL: 'configurable' machine missing from libafl-qemu-bridge ARM"
            exit 1
          }
        fi
        # upstream-QEMU + overlay ARM builds: smoke each variant. Failure
        # here means the overlay no longer applies cleanly OR applied
        # cleanly but produced a binary missing the `configurable`
        # machine — either way the patch refresh has gone wrong.
        for variant in v6.2.0 v10.0.9 v11.0.0; do
          bin="deps/build-qemu-upstream-$variant/arm-softmmu/qemu-system-arm"
          echo "=== Testing $bin ==="
          if [ ! -x "$bin" ]; then
            echo "FATAL: $bin missing — overlay build for $variant failed"
            exit 1
          fi
          "$bin" --version
          ldd "$bin" | grep "not found" && exit 1 || true
          "$bin" -machine help | grep -q configurable || {
            echo "FATAL: 'configurable' machine missing from $bin"
            "$bin" -machine help
            exit 1
          }
        done
        # Test that ARM QEMU can start and accept GDB connections
        deps/build-qemu/arm-softmmu/qemu-system-arm \
          -machine configurable -nographic -S -gdb tcp::19999 &
        QEMU_PID=$!
        sleep 3
        if kill -0 $QEMU_PID 2>/dev/null; then
          echo "QEMU ARM started successfully and is listening"
          kill $QEMU_PID || true
        else
          echo "FATAL: QEMU ARM failed to start"
          wait $QEMU_PID || true
          exit 1
        fi

    - name: run basic tests of executable
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        halucinator --help

    - name: smoke-test halucinator-mcp entry point
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        halucinator-mcp --help

    - name: test make_bin
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        rm ./test/STM32/example/Uart_Hyperterminal_IT_O0.elf.bin
        bash ./src/halucinator/tools/make_bin.sh ./test/STM32/example/Uart_Hyperterminal_IT_O0.elf
        test -f ./test/STM32/example/Uart_Hyperterminal_IT_O0.elf.bin

    - name: test make_addrs
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        hal_make_addr -b ./test/STM32/example/Uart_Hyperterminal_IT_O0.elf  -o $(pwd)/addrs_test.yaml
        test -f $(pwd)/addrs_test.yaml

    - name: run STM32 UART e2e test
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        bash ./test/STM32/example/run_test.bash

    - name: run Zephyr filesystem test
      continue-on-error: true  # Known issue: duplicate intercept config drops console_getline handler
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        bash ./test/zephyr/zephyr_fs/run_tests.bash

    - name: run Zephyr frdm_k64f UART test
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        bash ./test/zephyr/frdm_k64f_UART_Excellent_Test/run_tests.bash

    - name: run Zephyr olimex STM32 UART test
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        bash ./test/zephyr/olimex_stm32_h103_UART_Excellent_test/run_tests.bash

    - name: run p2im-drone firmware rehosting test
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        bash ./test/firmware-rehosting/p2im-drone/run_tests.bash

    - name: run Bus Pirate v5 (RP2040) demo smoke test
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        # bpv5_terminal is a two-process external device (matches the
        # STM32 UART example pattern); HAL_EMULATOR=avatar2 to match
        # the rest of the CI suite. Other backends are exercised by
        # running this script with HAL_EMULATOR=unicorn|qemu|ghidra|renode.
        HAL_EMULATOR=avatar2 bash ./test/firmware-rehosting/bpv5/run_tests.bash

    - name: run multi-arch e2e tests (ARM32, ARM64, MIPS)
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        for arch in arm32 arm64 mips; do
          pkill -9 -f qemu-system 2>/dev/null || true
          sleep 2
          echo "=== Testing $arch ==="
          bash ./test/multi_arch/$arch/run_tests.bash
          echo "$arch: PASSED"
        done

    - name: run multi-arch e2e tests (PPC, PPC64)
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        for arch in ppc ppc64; do
          pkill -9 -f qemu-system 2>/dev/null || true
          sleep 2
          echo "=== Testing $arch ==="
          bash ./test/multi_arch/$arch/run_tests.bash
          echo "$arch: PASSED"
        done

    - name: run i386 IRQ e2e test (x86)
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        pkill -9 -f qemu-system 2>/dev/null || true
        sleep 2
        echo "=== Testing x86 (i386, unicorn / X86Pic) ==="
        bash ./test/multi_arch_irq/x86/run_tests.bash
        echo "x86_irq: PASSED"

    - name: run i386 IRQ e2e test (x86, QEMU / LAPIC)
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        pkill -9 -f qemu-system 2>/dev/null || true
        sleep 2
        echo "=== Testing x86 (i386, QEMU configurable machine / LAPIC) ==="
        HAL_EMULATOR=qemu bash ./test/multi_arch_irq/x86_lapic/run_tests.bash
        echo "x86_lapic_irq: PASSED"

    - name: run pytest tests
      timeout-minutes: 15
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        PYTHONPATH=src:test/pytest/helpers \
          python3 -m pytest test/pytest/ \
          -m "not slow_zmq and not needs_root" \
          -p no:timeout --tb=short \
          --cov=halucinator --cov-report=term-missing --cov-report=html:coverage_report

    - name: run live qemu pytest against each overlay variant
      # The main pytest run above uses HALUCINATOR_QEMU_ARM, which points
      # at the avatar-qemu fork build. To prove each overlay variant
      # actually drives halucinator end-to-end (not just "configurable
      # machine is registered"), point HALUCINATOR_QEMU_ARM at each
      # overlay binary in turn and re-run only the live qemu backend
      # suite. Failure here means the overlay built a binary that QEMU
      # accepts as `-machine configurable` but halucinator's
      # QEMUBackend can't actually drive (GDB/QMP handshake, memory
      # ops, breakpoints).
      timeout-minutes: 10
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        for variant in v6.2.0 v10.0.9 v11.0.0; do
          bin="$(pwd)/deps/build-qemu-upstream-$variant/arm-softmmu/qemu-system-arm"
          echo "=== live qemu backend against upstream+overlay $variant ==="
          # Override HALUCINATOR_QEMU_ARM for this pytest invocation.
          # AVATAR2_QEMU_EXECUTABLE doesn't matter — these tests don't
          # touch avatar2 — but override it too for consistency in case
          # we add avatar2-overlay coverage later.
          HALUCINATOR_QEMU_ARM="$bin" \
          AVATAR2_QEMU_EXECUTABLE="$bin" \
          PYTHONPATH=src:test/pytest/helpers \
            python3 -m pytest test/pytest/backends/test_live_qemu_backend.py \
            -p no:timeout --tb=short -v
        done

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: coverage-report-${{ matrix.os }}
        path: coverage_report/

    - name: run python tests
      run: |
        set -e
        set -x
        source $(pwd)/virtualenvs/halucinator/bin/activate
        python3 ./test/python_tests/test_bp_struct.py

    - name: Save QEMU build cache
      # success() — only save when every prior step on this job has
      # passed. A failed Build QEMU step (or anything earlier) leaves
      # deps/build-qemu/ in a partial/empty state, and saving that
      # poisons every subsequent run that hits the same cache key.
      if: success() && steps.cache-qemu.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: deps/build-qemu
        key: qemu-build-v3-${{ matrix.os }}-${{ steps.qemu-ref.outputs.sha }}

    - name: Save libafl-qemu-bridge build cache
      # Same protection — only save on full-job success.
      if: success() && steps.cache-libafl-qemu.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: deps/build-qemu-libafl
        key: libafl-qemu-build-v1-${{ matrix.os }}-${{ steps.libafl-qemu-ref.outputs.sha }}

    - name: Save upstream-QEMU v6.2.0 + overlay cache
      if: success() && steps.cache-upstream-qemu-v62.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: deps/build-qemu-upstream-v6.2.0
        key: upstream-qemu-overlay-v6.2.0-${{ matrix.os }}-${{ steps.overlay-ref.outputs.sha }}

    - name: Save upstream-QEMU v10.0.9 + overlay cache
      if: success() && steps.cache-upstream-qemu-v10.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: deps/build-qemu-upstream-v10.0.9
        key: upstream-qemu-overlay-v10.0.9-${{ matrix.os }}-${{ steps.overlay-ref.outputs.sha }}

    - name: Save upstream-QEMU v11.0.0 + overlay cache
      if: success() && steps.cache-upstream-qemu-v11.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: deps/build-qemu-upstream-v11.0.0
        key: upstream-qemu-overlay-v11.0.0-${{ matrix.os }}-${{ steps.overlay-ref.outputs.sha }}

  # Proves the packaging story end-to-end: a plain `pip install halucinator[unicorn]`
  # into a clean virtualenv -- no avatar2, no externally-built QEMU, no submodules --
  # yields a working rehosting install. This job deliberately does NOT check out
  # submodules or build QEMU, so any failure here is unambiguously a packaging or
  # unicorn-backend regression rather than a toolchain problem. It is also the
  # matrix that validates the declared `requires-python = ">=3.9"`.
  pip-install-unicorn:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ['3.9', '3.11', '3.13']

    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}

    - name: Build wheel + sdist
      run: |
        set -e
        set -x
        python -m pip install --upgrade pip build
        python -m build
        ls -l dist/

    - name: Install the wheel into a clean venv (with the [unicorn] extra)
      run: |
        set -e
        set -x
        python -m venv /tmp/wheelenv
        /tmp/wheelenv/bin/pip install --upgrade pip
        /tmp/wheelenv/bin/pip install "$(ls dist/*.whl)[unicorn]"

    - name: Assert the install is avatar2-free, complete and typed
      run: |
        set -e
        set -x
        # The whole point of the [unicorn] tier: avatar2 must NOT be pulled in.
        if /tmp/wheelenv/bin/python -c "import avatar2" 2>/dev/null; then
          echo "FATAL: avatar2 was installed by halucinator[unicorn]"; exit 1
        fi
        # Console scripts must resolve (qemulog2trace regressed silently for
        # years because `tools` was not a packaged subpackage).
        /tmp/wheelenv/bin/halucinator --help > /dev/null
        /tmp/wheelenv/bin/qemulog2trace --help > /dev/null
        # Runtime data files + PEP 561 marker + single-sourced version.
        /tmp/wheelenv/bin/python - <<'PY'
        import os, halucinator
        pkg = os.path.dirname(halucinator.__file__)
        for f in ("logging.cfg", "py.typed"):
            assert os.path.exists(os.path.join(pkg, f)), "missing " + f
        assert halucinator.__version__, "no __version__"
        print("OK: data files, py.typed, version", halucinator.__version__)
        PY

    - name: Run the e2e suites on the unicorn backend
      timeout-minutes: 15
      run: |
        set -e
        set -x
        export PATH="/tmp/wheelenv/bin:$PATH"
        # ppc64 is deliberately excluded: in-process unicorn produces no UART
        # output for ppc64, a known unicorn coverage gap documented in
        # test/BACKEND_MATRIX.md. Every other multi_arch arch must pass, as
        # must the i386 IRQ suite (X86Pic synthesised interrupt delivery).
        for arch in arm32 arm64 mips ppc; do
          echo "=== multi_arch/$arch on unicorn ==="
          HAL_EMULATOR=unicorn bash ./test/multi_arch/$arch/run_tests.bash
          echo "$arch: PASSED"
        done
        echo "=== multi_arch_irq/x86 on unicorn ==="
        bash ./test/multi_arch_irq/x86/run_tests.bash
        echo "x86_irq: PASSED"

    - name: Install from the sdist as well
      run: |
        set -e
        set -x
        python -m venv /tmp/sdistenv
        /tmp/sdistenv/bin/pip install --upgrade pip
        /tmp/sdistenv/bin/pip install "$(ls dist/*.tar.gz)[unicorn]"
        /tmp/sdistenv/bin/halucinator --help > /dev/null
        echo "sdist install OK"

    - name: Check distribution metadata
      run: |
        set -e
        set -x
        python -m pip install --upgrade twine
        python -m twine check dist/*
